[colors.bright]
black = "#3B4252"
blue = "#569CD6"
cyan = "#29B8DB"
green = "#23D18B"
magenta = "#C586C0"
red = "#D54646"
white = "#ECEFF4"
yellow = "#D7BA7D"

[colors.normal]
black = "#3B4252"
blue = "#569CD6"
cyan = "#29B8DB"
green = "#23D18B"
magenta = "#C586C0"
red = "#D54646"
white = "#abb2bf"
yellow = "#D7BA7D"

[colors.primary]
background = "#232731"
foreground = "#D8DEE9"

[cursor]
cursor = "0xECEFF4"
text = "0x232731"

[font]
size = 17.0

[font.bold]
family = "JetBrainsMono Nerd Font Mono"

[font.glyph_offset]
x = 0
y = 0

[font.italic]
family = "JetBrainsMono Nerd Font Mono"

[font.normal]
family = "JetBrainsMono Nerd Font Mono"
style = "Regular"

[font.offset]
x = 0
y = 0

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "ResetFontSize"
key = "Key0"
mods = "Control"

[[keyboard.bindings]]
action = "IncreaseFontSize"
key = "Equals"
mods = "Control"

[[keyboard.bindings]]
action = "DecreaseFontSize"
key = "Minus"
mods = "Control"

[window]
history = 10000
live_config_reload = true
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>"

[window.padding]
x = 2
y = 2
